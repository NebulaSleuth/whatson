trigger: none  # Manual trigger only

pool:
  name: 'Default'
  demands:
    - Agent.Name -equals Alien

variables:
  NODE_VERSION: '20.x'

stages:
  # ── Stage 1: Backend ──
  - stage: Backend
    displayName: 'Build Backend'
    jobs:
      - job: BuildBackend
        displayName: 'Build & Type-check Backend'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '$(NODE_VERSION)'
            displayName: 'Install Node.js'

          - script: npm install --legacy-peer-deps
            displayName: 'Install dependencies'

          - script: npm run build:shared
            displayName: 'Build shared types'

          - script: npm run build:api
            displayName: 'Build API (TypeScript)'

          - script: cd packages/api && npm run typecheck
            displayName: 'Type-check API'

          - task: PublishBuildArtifacts@1
            inputs:
              pathToPublish: 'packages/api/dist'
              artifactName: 'backend-dist'
            displayName: 'Publish backend dist'

  # ── Stage 2: Backend Standalone + Installer (Linux) ──
  - stage: BackendInstaller
    displayName: 'Backend Installer'
    dependsOn: Backend
    jobs:
      - job: LinuxInstaller
        displayName: 'Build Standalone + Packages'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '$(NODE_VERSION)'
            displayName: 'Install Node.js'

          - script: npm install --legacy-peer-deps
            displayName: 'Install dependencies'

          - script: npm run build:shared
            displayName: 'Build shared types'

          - script: cd packages/api && npm run build:standalone
            displayName: 'Build standalone executable'

          # Install Ruby + fpm for .deb/.rpm packaging (optional)
          - script: |
              if command -v fpm &> /dev/null; then
                echo "fpm already installed"
              else
                sudo apt-get update -qq
                sudo apt-get install -y -qq ruby ruby-dev build-essential rpm
                sudo gem install --no-document fpm
              fi
            displayName: 'Install Ruby + fpm'
            continueOnError: true

          - script: cd packages/api && npm run build:installer
            displayName: 'Build Linux packages'

          - task: PublishBuildArtifacts@1
            inputs:
              pathToPublish: 'packages/api/installers'
              artifactName: 'linux-installer'
            displayName: 'Publish Linux packages'

  # ── Stage 3: Android Phone AAB ──
  - stage: AndroidPhone
    displayName: 'Android Phone Build'
    dependsOn: Backend
    jobs:
      - job: BuildAndroidPhone
        displayName: 'Build Android Phone AAB'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '$(NODE_VERSION)'
            displayName: 'Install Node.js'

          # Find or install Java 17
          - script: |
              # Check if Java is already installed
              if command -v java &> /dev/null; then
                echo "Java already installed:"
                java -version
                JAVA_DIR=$(dirname $(dirname $(readlink -f $(which java))))
              else
                echo "Java not found. Attempting install..."
                sudo apt-get update -qq && sudo apt-get install -y -qq openjdk-17-jdk || {
                  echo "##vso[task.logissue type=error]Java 17 not installed and sudo failed. Install manually: sudo apt-get install openjdk-17-jdk"
                  exit 1
                }
                JAVA_DIR=$(find /usr/lib/jvm -maxdepth 1 -name "java-17-openjdk-*" -type d | head -1)
              fi
              echo "JAVA_HOME=$JAVA_DIR"
              echo "##vso[task.setvariable variable=JAVA_HOME]$JAVA_DIR"
              echo "##vso[task.prependpath]$JAVA_DIR/bin"
            displayName: 'Find or install Java 17'

          # Install Android SDK if not present
          - script: |
              export ANDROID_HOME=${ANDROID_HOME:-$HOME/android-sdk}
              if [ -d "$ANDROID_HOME/cmdline-tools/latest/bin" ]; then
                echo "Android SDK already installed at $ANDROID_HOME"
              else
                echo "Installing Android SDK..."
                sudo apt-get install -y -qq unzip wget
                mkdir -p $ANDROID_HOME/cmdline-tools
                echo "Downloading command line tools..."
                wget -q --show-progress https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdtools.zip
                unzip -q /tmp/cmdtools.zip -d $ANDROID_HOME/cmdline-tools
                mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
                echo "Accepting licenses..."
                yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>&1 | tail -5
                echo "Installing platform tools, build tools, and platform..."
                $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-36" "build-tools;36.0.0" "platform-tools" 2>&1 | grep -E "done|Downloading|Installing"
                echo "Android SDK installation complete"
              fi
              echo "##vso[task.setvariable variable=ANDROID_HOME]$ANDROID_HOME"
              echo "##vso[task.prependpath]$ANDROID_HOME/platform-tools"
            displayName: 'Install Android SDK'

          - script: npm install --legacy-peer-deps
            displayName: 'Install dependencies'

          - script: npm run build:shared
            displayName: 'Build shared types'

          # Decode keystore (placed after prebuild creates the android/ directory)
          - script: echo "Keystore will be decoded after prebuild"
            displayName: 'Keystore placeholder'

          # Prebuild for phone
          - script: |
              cd apps/mobile
              WHATSON_TV=0 npx expo prebuild --platform android --no-install
            displayName: 'Expo prebuild (phone)'

          # Decode keystore into android/ directory
          - script: |
              echo "$KEYSTORE_B64" | tr -d '\r\n ' | base64 -d > apps/mobile/android/android-keystore.jks
              ls -la apps/mobile/android/android-keystore.jks
            displayName: 'Decode keystore'
            env:
              KEYSTORE_B64: $(KEYSTORE_BASE64)

          # Configure signing — secret vars mapped via env
          - script: |
              cd apps/mobile/android
              echo "WHATSON_UPLOAD_STORE_FILE=$(pwd)/android-keystore.jks" >> gradle.properties
              echo "WHATSON_UPLOAD_KEY_ALIAS=$KS_ALIAS" >> gradle.properties
              echo "WHATSON_UPLOAD_STORE_PASSWORD=$KS_PASSWORD" >> gradle.properties
              echo "WHATSON_UPLOAD_KEY_PASSWORD=$KS_PASSWORD" >> gradle.properties
            displayName: 'Configure signing'
            env:
              KS_ALIAS: $(KEYSTORE_ALIAS)
              KS_PASSWORD: $(KEYSTORE_PASSWORD)

          # Patch build.gradle for release signing
          - script: python3 scripts/patch-signing.py apps/mobile/android/app/build.gradle
            displayName: 'Configure release signing in Gradle'

          # Build AAB
          - script: |
              cd apps/mobile/android
              chmod +x gradlew
              ./gradlew app:bundleRelease -x lint -x test --no-daemon
            displayName: 'Build Android Phone AAB'

          - task: PublishBuildArtifacts@1
            inputs:
              pathToPublish: 'apps/mobile/android/app/build/outputs/bundle/release'
              artifactName: 'android-phone-aab'
            displayName: 'Publish Phone AAB'

  # ── Stage 4: Android TV AAB ──
