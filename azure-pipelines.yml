                $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools" > /dev/null 2>&1
                echo "##vso[task.setvariable variable=ANDROID_HOME]$ANDROID_HOME"
                echo "##vso[task.prependpath]$ANDROID_HOME/platform-tools"
              else
