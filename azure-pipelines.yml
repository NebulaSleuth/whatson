trigger: none  # Manual trigger only

pool:
  name: 'Default'

variables:
  NODE_VERSION: '20.x'

stages:
  # ── Stage 1: Backend ──
  - stage: Backend
    displayName: 'Build Backend'
    jobs:
      - job: BuildBackend
        displayName: 'Build & Type-check Backend'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '$(NODE_VERSION)'
            displayName: 'Install Node.js'

          - script: npm install --legacy-peer-deps
            displayName: 'Install dependencies'

          - script: npm run build:shared
            displayName: 'Build shared types'

          - script: npm run build:api
            displayName: 'Build API (TypeScript)'

          - script: cd packages/api && npm run typecheck
            displayName: 'Type-check API'

          - task: PublishBuildArtifacts@1
            inputs:
              pathToPublish: 'packages/api/dist'
              artifactName: 'backend-dist'
            displayName: 'Publish backend dist'

  # ── Stage 2: Backend Standalone + Installer (Linux) ──
  - stage: BackendInstaller
    displayName: 'Backend Installer'
    dependsOn: Backend
    jobs:
      - job: LinuxInstaller
        displayName: 'Build Standalone + Packages'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '$(NODE_VERSION)'
            displayName: 'Install Node.js'

          - script: npm install --legacy-peer-deps
            displayName: 'Install dependencies'

          - script: npm run build:shared
            displayName: 'Build shared types'

          - script: cd packages/api && npm run build:standalone
            displayName: 'Build standalone executable'

          # Install Ruby + fpm for .deb/.rpm packaging
          - script: |
              sudo apt-get update -qq
              sudo apt-get install -y -qq ruby ruby-dev build-essential rpm
              sudo gem install --no-document fpm
            displayName: 'Install Ruby + fpm'
            continueOnError: true

          - script: cd packages/api && npm run build:installer
            displayName: 'Build Linux packages'

          - task: PublishBuildArtifacts@1
            inputs:
              pathToPublish: 'packages/api/installers'
              artifactName: 'linux-installer'
            displayName: 'Publish Linux packages'

  # ── Stage 3: Android Phone AAB ──
  - stage: AndroidPhone
    displayName: 'Android Phone Build'
    dependsOn: Backend
    jobs:
      - job: BuildAndroidPhone
        displayName: 'Build Android Phone AAB'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '$(NODE_VERSION)'
            displayName: 'Install Node.js'

          # Install Java 17
          - script: |
              sudo apt-get update -qq
              sudo apt-get install -y -qq openjdk-17-jdk
              echo "##vso[task.setvariable variable=JAVA_HOME]/usr/lib/jvm/java-17-openjdk-amd64"
              echo "##vso[task.prependpath]/usr/lib/jvm/java-17-openjdk-amd64/bin"
            displayName: 'Install Java 17'

          # Install Android SDK if not present
          - script: |
              if [ -z "$ANDROID_HOME" ] || [ ! -d "$ANDROID_HOME" ]; then
                echo "Installing Android SDK..."
                sudo apt-get install -y -qq unzip wget
                export ANDROID_HOME=$HOME/android-sdk
                mkdir -p $ANDROID_HOME/cmdline-tools
                wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdtools.zip
                unzip -q /tmp/cmdtools.zip -d $ANDROID_HOME/cmdline-tools
                mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
                yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1
                $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools" > /dev/null 2>&1
                echo "##vso[task.setvariable variable=ANDROID_HOME]$ANDROID_HOME"
                echo "##vso[task.prependpath]$ANDROID_HOME/platform-tools"
              else
                echo "Android SDK found at $ANDROID_HOME"
              fi
            displayName: 'Install Android SDK'

          - script: npm install --legacy-peer-deps
            displayName: 'Install dependencies'

          - script: npm run build:shared
            displayName: 'Build shared types'

          # Decode keystore
          - script: echo "$(KEYSTORE_BASE64)" | base64 -d > apps/mobile/android-keystore.jks
            displayName: 'Decode keystore'

          # Prebuild for phone
          - script: |
              cd apps/mobile
              WHATSON_TV=0 npx expo prebuild --platform android --no-install
            displayName: 'Expo prebuild (phone)'

          # Configure signing
          - script: |
              cd apps/mobile/android
              cat >> gradle.properties << 'GRADLEEOF'
              WHATSON_UPLOAD_STORE_FILE=../android-keystore.jks
              WHATSON_UPLOAD_KEY_ALIAS=$(KEYSTORE_ALIAS)
              WHATSON_UPLOAD_STORE_PASSWORD=$(KEYSTORE_PASSWORD)
              WHATSON_UPLOAD_KEY_PASSWORD=$(KEYSTORE_PASSWORD)
              GRADLEEOF
            displayName: 'Configure signing'

          # Patch build.gradle for signing
          - script: |
              cd apps/mobile/android/app
              sed -i '/signingConfigs {/,/}/c\
              signingConfigs {\
                  release {\
                      storeFile file(WHATSON_UPLOAD_STORE_FILE)\
                      storePassword WHATSON_UPLOAD_STORE_PASSWORD\
                      keyAlias WHATSON_UPLOAD_KEY_ALIAS\
                      keyPassword WHATSON_UPLOAD_KEY_PASSWORD\
                  }\
              }' build.gradle
              sed -i 's/signingConfig signingConfigs.debug/signingConfig signingConfigs.release/' build.gradle
            displayName: 'Configure release signing in Gradle'
            continueOnError: true

          # Build AAB
          - script: |
              cd apps/mobile/android
              chmod +x gradlew
              ./gradlew app:bundleRelease -x lint -x test --no-daemon
            displayName: 'Build Android Phone AAB'

          - task: PublishBuildArtifacts@1
            inputs:
              pathToPublish: 'apps/mobile/android/app/build/outputs/bundle/release'
              artifactName: 'android-phone-aab'
            displayName: 'Publish Phone AAB'

  # ── Stage 4: Android TV AAB ──
  - stage: AndroidTV
    displayName: 'Android TV Build'
